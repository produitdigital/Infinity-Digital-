<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Download Product</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#0f172a,#1e293b);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:white;
}

.card{
  background:#111827;
  padding:35px;
  border-radius:18px;
  width:340px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.6);
  animation: fadeIn 0.5s ease-in-out;
}

h2{
  margin-bottom:10px;
}

p{
  font-size:14px;
  color:#cbd5e1;
}

.btn{
  display:none;
  margin-top:20px;
  padding:12px;
  background:#22c55e;
  color:white;
  text-decoration:none;
  border-radius:10px;
  font-weight:bold;
  transition:0.3s;
}

.btn:hover{
  background:#16a34a;
  transform:scale(1.05);
}

.loading{
  margin-top:20px;
  font-size:13px;
  color:#fbbf24;
}

.error{
  margin-top:15px;
  color:#f87171;
  font-size:13px;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="card">
  <h2>📦 Your Product</h2>
  <p>Checking your access...</p>

  <div class="loading" id="status">⏳ Loading...</div>

  <a id="btn" href="#" class="btn" target="_blank">
    ⬇ Download PDF
  </a>

  <div class="error" id="error"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCj3UXVG4Sa499iiY9MrfO3llXYZuipJos",
  authDomain: "digital-product-store-690ea.firebaseapp.com",
  projectId: "digital-product-store-690ea",
  storageBucket: "digital-product-store-690ea.firebasestorage.app",
  messagingSenderId: "782111280512",
  appId: "1:782111280512:web:c8a9b932225895bf004565"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const uid = localStorage.getItem("uid");

const status = document.getElementById("status");
const error = document.getElementById("error");

if (!uid) {
  window.location.href = "login.html";
}

try {
  const docRef = doc(db, "users", uid);
  const docSnap = await getDoc(docRef);

  if (docSnap.exists()) {
    const data = docSnap.data();

    if (data.access === true) {

      status.innerText = "Access granted ✅";

      const btn = document.getElementById("btn");
      btn.style.display = "inline-block";
      btn.href = "https://drive.google.com/uc?export=download&id=1cAcui_GS7oLZOvYmpdhzNNE-CucfdHAv";

    } else {
      status.innerText = "";
      error.innerText = "Access denied ❌";
      setTimeout(()=> window.location.href="login.html", 1500);
    }

  } else {
    status.innerText = "";
    error.innerText = "User not found ❌";
    setTimeout(()=> window.location.href="login.html", 1500);
  }

} catch (e) {
  status.innerText = "";
  error.innerText = "Error loading data ❌";
}
</script>

</body>
</html>
