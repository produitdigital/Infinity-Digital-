<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact Us</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-H994YHY02C"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-H994YHY02C');
  </script>

  <link rel="stylesheet" href="./style.css">
</head>

<body>

<div class="hero-box">
  <h1>📩 Contact Us</h1>
  <p>
    Have questions about the program, your order, or need support?
    We’re here to help you succeed.
  </p>
</div>

<div class="container">

  <div class="debug-box">
    <h2>📧 Email Support</h2>
    <p><strong>rasolojean44@gmail.com</strong></p>
    <p>We respond within <strong>24–48 hours</strong>.</p>
  </div>

  <div class="debug-box">
    <h2>🚀 Quick Message Form</h2>

    <form id="contactForm">

      <input id="name" type="text" placeholder="Your name" required
        style="width:100%;padding:10px;margin:8px 0;">

      <input id="email" type="email" placeholder="Your email" required
        style="width:100%;padding:10px;margin:8px 0;">

      <textarea id="message" rows="5" placeholder="Your message" required
        style="width:100%;padding:10px;margin:8px 0;"></textarea>

      <button class="btn" type="submit">Send Message</button>

    </form>

  </div>

</div>

<!-- 🔥 FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, addDoc, collection, serverTimestamp } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCj3UXVG4Sa499iiY9MrfO3llXYZuipJos",
  authDomain: "digital-product-store-690ea.firebaseapp.com",
  projectId: "digital-product-store-690ea",
  storageBucket: "digital-product-store-690ea.firebasestorage.app",
  messagingSenderId: "782111280512",
  appId: "1:782111280512:web:c8a9b932225895bf004565"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

document.getElementById("contactForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  try {

    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const message = document.getElementById("message").value;

    // 🟢 SAVE MESSAGE
    await addDoc(collection(db, "messages"), {
      name,
      email,
      message,
      createdAt: serverTimestamp()
    });

    // 🟢 SAVE LEAD
    await addDoc(collection(db, "leads"), {
      name,
      email,
      createdAt: serverTimestamp()
    });

    // 🔥 THANK YOU REDIRECT
    window.location.href = "thankyou.html";

  } catch (error) {
    console.error(error);
    alert("Error sending message");
  }

});
</script>

</body>
</html>
